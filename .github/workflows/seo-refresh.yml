name: SEO refresh (sitemaps)
on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Regenerar datasets LLM
        run: node scripts/generate-llms-data.mjs
      - name: Regenerar estáticos por país
        run: node scripts/generate-country-static.mjs
      - name: Regenerar sitemaps
        run: node scripts/generate-sitemap.mjs
      - name: Commit datasets+sitemaps
        run: |
          git config user.name "SEO Bot"
          git config user.email "bot@eligetuhosting.cl"
          git add public/data/proveedores*.json public/llms.txt public/llms-full.txt public/pe public/mx public/co public/ar public/sitemap*.xml
          if ! git diff --cached --quiet; then
            git commit -m "chore(seo): refresh datasets+sitemaps $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          else
            echo "sin cambios"
          fi
